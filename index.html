<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 시스템보안 성적 조회</title>
<style>
  :root{
    --ink:#1b1d22; --muted:#6a7080; --paper:#e9ebef; --card:#ffffff;
    --line:#d8dce3; --accent:#7a2230; --accent-2:#9a2c3c; --good:#1f6b4c;
    --warnbg:#fcf3f4; --warnline:#e6c4c9; --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",
      "Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:var(--paper);
    min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:42px 18px;
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.04) 1px, transparent 0);
    background-size:22px 22px;
  }
  .wrap{width:100%; max-width:480px}

  .eyebrow{font-size:12px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); margin:0 0 6px}
  h1{font-size:30px; line-height:1.1; margin:0 0 14px; letter-spacing:-.01em}
  .rule{height:0; border:0; border-top:3px double var(--ink); margin:0 0 20px; opacity:.85}

  /* 탭 */
  .tabs{display:flex; gap:6px; margin-bottom:16px}
  .tab{
    flex:1; padding:11px 10px; font-size:15px; font-weight:700; text-align:center;
    background:#dfe3ea; color:var(--muted); border:1.5px solid var(--line);
    border-radius:10px; cursor:pointer; transition:all .15s;
  }
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent)}

  .notice{
    background:var(--warnbg); border:1px solid var(--warnline); border-radius:10px;
    padding:13px 14px; font-size:13px; line-height:1.6; color:#7a2230; margin-bottom:18px;
  }
  .notice b{font-weight:800}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:24px 22px; box-shadow:0 1px 0 rgba(0,0,0,.02), 0 18px 40px -28px rgba(0,0,0,.28);
  }
  label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin:0 0 7px}
  .field{margin-bottom:15px}
  input{
    width:100%; padding:13px 14px; font-size:16px; color:var(--ink);
    border:1.5px solid var(--line); border-radius:10px; background:#fbfcfd;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(122,34,48,.14)}
  input.code{letter-spacing:.5em; text-align:center; font-weight:700; font-variant-numeric:tabular-nums}

  button{
    width:100%; padding:14px 16px; font-size:16px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:10px; cursor:pointer; letter-spacing:.02em;
    transition:background .15s, transform .05s;
  }
  button:hover{background:var(--accent-2)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.6; cursor:default}
  button:focus-visible{outline:3px solid rgba(122,34,48,.4); outline-offset:2px}

  .msg{font-size:14px; margin:14px 2px 0; min-height:18px; line-height:1.5}
  .msg.error{color:var(--accent)}
  .msg.ok{color:var(--good)}
  .hint{font-size:12.5px; color:var(--muted); margin:16px 2px 0; line-height:1.55}

  .sheet-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px}
  .sheet-name{font-size:22px; font-weight:800; letter-spacing:-.01em}
  .sheet-id{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
  .sheet-rule{height:0; border:0; border-top:2px solid var(--ink); margin:12px 0 4px}
  .row{display:flex; justify-content:space-between; align-items:baseline; gap:14px; padding:13px 2px; border-bottom:1px solid var(--line)}
  .row .k{font-size:15px; color:var(--muted)}
  .row .v{font-size:17px; font-weight:600; font-variant-numeric:tabular-nums; text-align:right}
  .row.total{border-bottom:0; padding-top:16px}
  .row.total .k{color:var(--ink); font-weight:700; font-size:16px}
  .row.total .v{font-size:22px; font-weight:800; color:var(--good)}
  .ghost{background:transparent; color:var(--accent); border:1.5px solid var(--line); margin-top:20px}
  .ghost:hover{background:#faf3f4; border-color:var(--accent)}

  .reveal{animation:rise .35s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){ .reveal{animation:none} }
  .hidden{display:none}
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Grade Portal</p>
    <h1> 2026 시스템보안 성적 조회</h1>
    <hr class="rule">

    <div class="notice">
      ⚠ <b>본인 학번으로 한 번만</b> 확인번호를 등록하세요.
      타인의 학번을 도용해 등록하거나, 다른 학생의 확인번호를 추측·도용해 성적을 열람하려는 시도는
      <b>모두 기록</b>되며, 적발 시 <b>부정행위로 F 처리</b>될 수 있습니다.
    </div>

    <div class="tabs">
      <div class="tab active" id="tabLookup">성적 조회</div>
      <div class="tab" id="tabRegister">확인번호 등록</div>
    </div>

    <!-- 조회 -->
    <div class="card" id="lookupCard">
      <div class="field">
        <label for="lid">학번</label>
        <input id="lid" inputmode="numeric" autocomplete="off" placeholder="예: 20251234">
      </div>
      <div class="field">
        <label for="lcode">확인번호</label>
        <input id="lcode" class="code" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="● ● ● ●">
      </div>
      <button id="lookupBtn">성적 확인</button>
      <p class="msg" id="lmsg"></p>
      <p class="hint">아직 확인번호를 등록하지 않았다면, 위의 <b>확인번호 등록</b> 탭에서 먼저 등록하세요.</p>
    </div>

    <!-- 등록 -->
    <div class="card hidden" id="registerCard">
      <div class="field">
        <label for="rid">학번</label>
        <input id="rid" inputmode="numeric" autocomplete="off" placeholder="예: 20251234">
      </div>
      <div class="field">
        <label for="rcode">사용할 확인번호 (숫자 4자리)</label>
        <input id="rcode" class="code" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="● ● ● ●">
      </div>
      <button id="registerBtn">확인번호 등록</button>
      <p class="msg" id="rmsg"></p>
      <p class="hint">한 번 등록하면 변경이 어렵습니다. 본인만 아는 숫자로 신중히 정하세요.</p>
    </div>

    <!-- 결과 -->
    <div class="card reveal hidden" id="resultCard">
      <div class="sheet-head">
        <span class="sheet-name" id="rName"></span>
        <span class="sheet-id" id="rIdShow"></span>
      </div>
      <hr class="sheet-rule">
      <div id="rRows"></div>
      <button class="ghost" id="backBtn">다시 조회하기</button>
    </div>
  </div>

<script>
  // ▼▼▼ Apps Script 웹앱 주소(/exec)를 붙여넣으세요 ▼▼▼
  const API_URL = "https://script.google.com/macros/s/AKfycbwp5k0tcf7wk-0_u4DKGXNTQeETHf1CqUtlYTsEpCZN8Hfc9vGZCLZRnVN79AqBe52RWQ/exec";
  // ▲▲▲▲▲▲

  const $ = id => document.getElementById(id);
  const cards = { lookup: $("lookupCard"), register: $("registerCard"), result: $("resultCard") };

  function show(which){
    cards.lookup.classList.toggle("hidden", which !== "lookup");
    cards.register.classList.toggle("hidden", which !== "register");
    cards.result.classList.toggle("hidden", which !== "result");
    $("tabLookup").classList.toggle("active", which === "lookup");
    $("tabRegister").classList.toggle("active", which === "register");
  }
  $("tabLookup").onclick = () => { show("lookup"); $("lmsg").textContent=""; };
  $("tabRegister").onclick = () => { show("register"); $("rmsg").textContent=""; };

  async function call(payload){
    if(API_URL.startsWith("PASTE")) return { ok:false, error:"설정 오류: API 주소가 입력되지 않았습니다." };
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  // 등록
  $("registerBtn").addEventListener("click", async () => {
    const studentId = $("rid").value.trim();
    const code = $("rcode").value.trim();
    const msg = $("rmsg"); msg.className="msg"; msg.textContent="";
    if(!studentId || !/^\d{4}$/.test(code)){ msg.className="msg error"; msg.textContent="학번과 숫자 4자리 확인번호를 정확히 입력하세요."; return; }
    const btn = $("registerBtn"); btn.disabled=true; btn.textContent="등록 중…";
    try{
      const data = await call({ action:"register", studentId, code });
      if(data.ok){ msg.className="msg ok"; msg.textContent = data.message || "등록되었습니다."; $("rcode").value=""; }
      else{ msg.className="msg error"; msg.textContent = data.error || "등록에 실패했습니다."; }
    }catch(e){ msg.className="msg error"; msg.textContent="서버에 연결하지 못했습니다."; }
    finally{ btn.disabled=false; btn.textContent="확인번호 등록"; }
  });

  // 조회
  $("lookupBtn").addEventListener("click", async () => {
    const studentId = $("lid").value.trim();
    const code = $("lcode").value.trim();
    const msg = $("lmsg"); msg.className="msg"; msg.textContent="";
    if(!studentId || !code){ msg.className="msg error"; msg.textContent="학번과 확인번호를 모두 입력하세요."; return; }
    const btn = $("lookupBtn"); btn.disabled=true; btn.textContent="조회 중…";
    try{
      const data = await call({ action:"lookup", studentId, code });
      if(data.ok) render(data);
      else{ msg.className="msg error"; msg.textContent = data.error || "조회에 실패했습니다."; }
    }catch(e){ msg.className="msg error"; msg.textContent="서버에 연결하지 못했습니다."; }
    finally{ btn.disabled=false; btn.textContent="성적 확인"; }
  });

  function render(d){
    $("rName").textContent = d.name ? d.name : "성적표";
    $("rIdShow").textContent = d.studentId || "";
    const rows = $("rRows"); rows.innerHTML = "";
    (d.items || []).forEach(it => {
      const isTotal = /총점|총계|평점|등급|학점/.test(it.label);
      const row = document.createElement("div");
      row.className = "row" + (isTotal ? " total" : "");
      row.innerHTML = '<span class="k"></span><span class="v"></span>';
      row.querySelector(".k").textContent = it.label;
      row.querySelector(".v").textContent = it.value;
      rows.appendChild(row);
    });
    show("result");
  }
  $("backBtn").addEventListener("click", () => { $("lcode").value=""; $("lmsg").textContent=""; show("lookup"); $("lid").focus(); });

  // Enter 키 흐름
  $("lid").addEventListener("keydown", e => { if(e.key==="Enter") $("lcode").focus(); });
  $("lcode").addEventListener("keydown", e => { if(e.key==="Enter") $("lookupBtn").click(); });
  $("rid").addEventListener("keydown", e => { if(e.key==="Enter") $("rcode").focus(); });
  $("rcode").addEventListener("keydown", e => { if(e.key==="Enter") $("registerBtn").click(); });
</script>
</body>
</html>
