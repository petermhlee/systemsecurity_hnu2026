<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>성적 조회</title>
<style>
  :root{
    --ink:#1b1d22; --muted:#6a7080; --paper:#e9ebef; --card:#ffffff;
    --line:#d8dce3; --accent:#7a2230; --accent-2:#9a2c3c; --good:#1f6b4c;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",
      "Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:var(--paper);
    min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
    padding:48px 18px;
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.04) 1px, transparent 0);
    background-size:22px 22px;
  }
  .wrap{width:100%; max-width:480px}

  .eyebrow{
    font-size:12px; font-weight:700; letter-spacing:.28em; text-transform:uppercase;
    color:var(--accent); margin:0 0 6px;
  }
  h1{font-size:30px; line-height:1.1; margin:0 0 14px; letter-spacing:-.01em}
  .rule{height:0; border:0; border-top:3px double var(--ink); margin:0 0 24px; opacity:.85}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:26px 24px; box-shadow:0 1px 0 rgba(0,0,0,.02), 0 18px 40px -28px rgba(0,0,0,.28);
  }

  label{display:block; font-size:13px; font-weight:600; color:var(--muted); margin:0 0 7px}
  .field{margin-bottom:16px}
  input{
    width:100%; padding:13px 14px; font-size:16px; color:var(--ink);
    border:1.5px solid var(--line); border-radius:10px; background:#fbfcfd;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(122,34,48,.14)}

  button{
    width:100%; padding:14px 16px; font-size:16px; font-weight:700; color:#fff;
    background:var(--accent); border:0; border-radius:10px; cursor:pointer;
    letter-spacing:.02em; transition:background .15s, transform .05s;
  }
  button:hover{background:var(--accent-2)}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.6; cursor:default}
  button:focus-visible{outline:3px solid rgba(122,34,48,.4); outline-offset:2px}

  .msg{font-size:14px; margin:14px 2px 0; min-height:18px}
  .msg.error{color:var(--accent)}
  .hint{font-size:12.5px; color:var(--muted); margin:18px 2px 0; line-height:1.55}

  /* 결과(성적표) */
  .sheet-head{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:4px}
  .sheet-name{font-size:22px; font-weight:800; letter-spacing:-.01em}
  .sheet-id{font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums}
  .sheet-rule{height:0; border:0; border-top:2px solid var(--ink); margin:12px 0 4px}

  .row{
    display:flex; justify-content:space-between; align-items:baseline; gap:14px;
    padding:13px 2px; border-bottom:1px solid var(--line);
  }
  .row .k{font-size:15px; color:var(--muted)}
  .row .v{font-size:17px; font-weight:600; font-variant-numeric:tabular-nums; text-align:right}
  .row.total{border-bottom:0; padding-top:16px}
  .row.total .k{color:var(--ink); font-weight:700; font-size:16px}
  .row.total .v{font-size:22px; font-weight:800; color:var(--good)}

  .ghost{
    background:transparent; color:var(--accent); border:1.5px solid var(--line);
    margin-top:20px;
  }
  .ghost:hover{background:#faf3f4; border-color:var(--accent)}

  .reveal{animation:rise .35s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion:reduce){ .reveal{animation:none} }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Grade Portal</p>
    <h1>성적 조회</h1>
    <hr class="rule">

    <!-- 로그인 -->
    <div class="card" id="loginCard">
      <div class="field">
        <label for="sid">학번</label>
        <input id="sid" inputmode="numeric" autocomplete="username" placeholder="예: 20251234">
      </div>
      <div class="field">
        <label for="pw">비밀번호</label>
        <input id="pw" type="password" autocomplete="current-password" placeholder="이메일로 받은 비밀번호">
      </div>
      <button id="loginBtn">성적 확인</button>
      <p class="msg" id="msg"></p>
      <p class="hint">학번과 함께, 안내 메일로 받은 비밀번호를 입력하세요.<br>
        비밀번호를 잊었다면 담당 교수에게 문의해 재발송을 요청하세요.</p>
    </div>

    <!-- 결과 -->
    <div class="card reveal" id="resultCard" style="display:none">
      <div class="sheet-head">
        <span class="sheet-name" id="rName"></span>
        <span class="sheet-id" id="rId"></span>
      </div>
      <hr class="sheet-rule">
      <div id="rRows"></div>
      <button class="ghost" id="backBtn">다른 계정으로 다시 조회</button>
    </div>
  </div>

<script>
  // ▼▼▼ 여기에 Apps Script 웹앱 주소를 붙여넣으세요 ▼▼▼
  const API_URL = "https://script.google.com/macros/s/AKfycbxVegQMp_zBEWP5eqOodx-bgbVsqPFLYpcNsPRQK_msPZAbTKGJ8uS3Nrb1KxIxLhADbQ/exec";
  // ▲▲▲ /exec 로 끝나는 주소입니다 ▲▲▲

  const $ = id => document.getElementById(id);
  const loginCard = $("loginCard"), resultCard = $("resultCard");
  const msg = $("msg"), btn = $("loginBtn");

  async function lookup(){
    const studentId = $("sid").value.trim();
    const password  = $("pw").value;
    msg.textContent = ""; msg.className = "msg";

    if(!studentId || !password){ msg.textContent = "학번과 비밀번호를 모두 입력하세요."; msg.className="msg error"; return; }
    if(API_URL.startsWith("PASTE")){ msg.textContent = "설정 오류: API 주소가 입력되지 않았습니다."; msg.className="msg error"; return; }

    btn.disabled = true; btn.textContent = "조회 중…";
    try{
      const res = await fetch(API_URL, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" }, // 프리플라이트 회피
        body: JSON.stringify({ studentId, password })
      });
      const data = await res.json();
      if(!data.ok){ msg.textContent = data.error || "조회에 실패했습니다."; msg.className="msg error"; return; }
      render(data);
    }catch(e){
      msg.textContent = "서버에 연결하지 못했습니다. 잠시 후 다시 시도하세요.";
      msg.className = "msg error";
    }finally{
      btn.disabled = false; btn.textContent = "성적 확인";
    }
  }

  function render(d){
    $("rName").textContent = d.name ? d.name : "성적표";
    $("rId").textContent   = d.studentId || "";
    const rows = $("rRows"); rows.innerHTML = "";
    (d.items || []).forEach(it => {
      const isTotal = /총점|총계|평점|등급|학점/.test(it.label);
      const row = document.createElement("div");
      row.className = "row" + (isTotal ? " total" : "");
      row.innerHTML = `<span class="k"></span><span class="v"></span>`;
      row.querySelector(".k").textContent = it.label;
      row.querySelector(".v").textContent = it.value;
      rows.appendChild(row);
    });
    loginCard.style.display = "none";
    resultCard.style.display = "block";
  }

  function reset(){
    resultCard.style.display = "none";
    loginCard.style.display = "block";
    $("pw").value = ""; msg.textContent = ""; msg.className = "msg";
    $("sid").focus();
  }

  btn.addEventListener("click", lookup);
  $("pw").addEventListener("keydown", e => { if(e.key === "Enter") lookup(); });
  $("sid").addEventListener("keydown", e => { if(e.key === "Enter") $("pw").focus(); });
  $("backBtn").addEventListener("click", reset);
</script>
</body>
</html>
